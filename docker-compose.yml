services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      APP_ENV: local
      API_PREFIX: /api/v1
      DEFAULT_AI_PROVIDER: ${DEFAULT_AI_PROVIDER:-local}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4-mini}
      OCI_AI_ENDPOINT: ${OCI_AI_ENDPOINT:-}
      OCI_AI_API_KEY: ${OCI_AI_API_KEY:-}
      OCI_AI_MODEL: ${OCI_AI_MODEL:-cohere.command-r-16k}
    ports:
      - "8000:8000"

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    depends_on:
      - api
    ports:
      - "5173:4173"
